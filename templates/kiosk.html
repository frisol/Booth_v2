<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Fixed viewport width matches display resolution — no scaling in kiosk mode -->
    <meta name="viewport" content="width=1600">
    <title>Photobooth</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="kiosk-root">
        <!-- Splash background — populated with images from Phase 4 onwards -->
        <div id="splash"></div>

        <!-- Main content overlay — state-specific UI injected here in later phases -->
        <div id="content"></div>

        <!-- Dev aid: current state indicator, bottom-left corner -->
        <div id="state-label">STATE: <span id="state-value">—</span></div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
